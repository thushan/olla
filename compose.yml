version: '3.8'

services:
  olla:
    build: .
    ports:
      - "19841:19841"
      - "9090:9090"  # Metrics part
    environment:
      - OLLA_LOG_LEVEL=info
      - OLLA_SERVER_HOST=0.0.0.0
      - OLLA_SERVER_PORT=19841
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - ./plugins:/app/plugins:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:19841/internal/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - olla-network

  # Example Ollama services that Olla can proxy to
  ollama-primary:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-primary-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - olla-network
    restart: unless-stopped

  ollama-secondary:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama-secondary-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - olla-network
    restart: unless-stopped

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - olla-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - olla-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  ollama-primary-data:
  ollama-secondary-data:
  prometheus-data:
  grafana-data:

networks:
  olla-network:
    driver: bridge